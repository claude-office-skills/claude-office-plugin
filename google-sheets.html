<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <base target="_top" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude for Sheets</title>
    <style>
      @keyframes _spin{to{transform:rotate(360deg)}}
      body{margin:0;overflow:hidden}
      #root{width:100%;height:100vh}
      #_loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#fff}
      @media(prefers-color-scheme:light){#_loading{background:#fff;color:#333}}
      #_spin-ring{width:32px;height:32px;border:2.5px solid rgba(128,128,128,.2);border-top-color:#888;border-radius:50%;animation:_spin .8s linear infinite;margin-bottom:14px}
    </style>
  </head>
  <body>
    <div id="root">
      <div id="_loading">
        <div id="_spin-ring"></div>
        <div style="font-size:13px;opacity:.6">Claude for Sheets</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
